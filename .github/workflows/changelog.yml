name: Changelog

on:
  # Regenerate whenever main moves (bot pushes with GITHUB_TOKEN don't retrigger)
  push:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — the changelog needs every commit

      - name: Generate docs/CHANGELOG.md
        run: python3 scripts/generate_changelog.py

      - name: Commit if changed
        run: |
          if git diff --quiet docs/CHANGELOG.md; then
            echo "Changelog unchanged, nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/CHANGELOG.md
          git commit -m "chore: update docs/CHANGELOG.md [skip ci]"
          git push
