name: Docs Automation

on:
  # Daily at 04:30 UTC (06:30 SAST)
  schedule:
    - cron: "30 4 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      # Each refresher is independent — one failing source shouldn't block the rest
      - name: Sync blog articles
        continue-on-error: true
        run: python3 scripts/sync_articles.py

      - name: Generate project inventory
        continue-on-error: true
        run: python3 scripts/generate_projects.py

      - name: Refresh impact stats
        continue-on-error: true
        run: python3 scripts/update_stats.py

      - name: Regenerate docs index
        continue-on-error: true
        run: python3 scripts/generate_docs_index.py

      - name: Check link health
        run: python3 scripts/check_links.py

      - name: Commit changes
        run: |
          if git diff --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "Nothing changed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: refresh automated docs [skip ci]"
          git push

      - name: Open issue if links are broken
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! grep -q "FAIL" docs/LINK-HEALTH.md; then
            echo "All links healthy."
            exit 0
          fi
          if [ -n "$(gh issue list --state open --label link-health --json number --jq '.[0].number')" ]; then
            echo "Open link-health issue already exists."
            exit 0
          fi
          gh label create link-health --color d73a4a --description "Broken README links" --force
          BROKEN=$(grep "FAIL" docs/LINK-HEALTH.md | head -20)
          gh issue create \
            --title "Broken links detected in README" \
            --label link-health \
            --body "$(printf 'The daily link check found broken URLs:\n\n%s\n\nFull report: docs/LINK-HEALTH.md' "$BROKEN")"
