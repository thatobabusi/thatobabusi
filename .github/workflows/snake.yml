name: Contribution Snake

on:
  # Regenerate twice a day
  schedule:
    - cron: "0 5,17 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  # Regenerate when the workflow itself changes
  push:
    branches: [main]
    paths: [".github/workflows/snake.yml"]

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: thatobabusi
          outputs: |
            dist/github-snake.svg?palette=github-dark

      # Publishes dist/ to the "output" branch so main stays clean
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
