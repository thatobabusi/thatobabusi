<text x="60" y="80" font-size="14" fill="#a9b1d6" xml:space="preserve"><tspan fill="#7dcfff">Infrastructure</tspan><tspan fill="#89ddff">::</tspan><tspan fill="#7aa2f7">preferred</tspan><tspan fill="#a9b1d6">(</tspan><tspan fill="#a9b1d6">)</tspan></text>
<text x="46" y="102" text-anchor="end" font-size="14" fill="#3b4261">2</text>
